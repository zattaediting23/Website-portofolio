    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        spaceBlack: "#020204",
                        nebulaPurple: "#4c1d95",
                        starCyan: "#22d3ee",
                        voidGray: "#1f2937",

    <style>
        body {
            background-color: #020204;
            color: #e2e8f0;
            background-image: radial-gradient(white, rgba(255, 255, 255, 0.2) 2px, transparent 3px), radial-gradient(white, rgba(255, 255, 255, 0.15) 1px, transparent 2px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
        }
        
        .glass {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .page {
            display: none;
        }
        
        .page-active {
            display: block;
        }
        
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #22d3ee;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        .scroll-anim {
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .scroll-up {
            transform: translateY(30px);
        }
        
        .scroll-left {
            transform: translateX(-30px);
        }
        
        .scroll-right {
            transform: translateX(30px);
        }
        
        .scroll-scale {
            transform: scale(0.95);
        }
        
        .scroll-anim.show {
            opacity: 1;
            transform: translate(0) scale(1);
        }
    </style>
</head>

    <script>
      const API_URL =
        "https://script.google.com/macros/s/AKfycbz_Tl2lpfkgBOsf0ksTRRGp7DlS_W3Ar3QayP6egYlF89F4-ULgCwCfXga7Z51p5Zyd9w/exec";
      const ADMIN_EMAIL = "zhafranediting23@gmail.com";
      let modeForm = "login";
      let editIndex = -1;
      let dbData = { profile: {}, cv: "#", projects: [] };

      const scrollObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("show");
              scrollObserver.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.1, rootMargin: "0px 0px -50px 0px" },
      );

      function aktifkanAnimasiScroll() {
        document
          .querySelectorAll(".scroll-anim:not(.show)")
          .forEach((el) => scrollObserver.observe(el));
      }

      const iconList = [
        { name: "Mainkan (Play)", class: "fa-solid fa-play" },
        { name: "Unduh (Download)", class: "fa-solid fa-download" },
        { name: "GitHub (Source Code)", class: "fa-brands fa-github" },
        { name: "Website (Globe)", class: "fa-solid fa-globe" },
        {
          name: "Buka Tautan (External)",
          class: "fa-solid fa-arrow-up-right-from-square",
        },
        { name: "Kode (Code)", class: "fa-solid fa-code" },
        { name: "Google Drive", class: "fa-brands fa-google-drive" },
        { name: "YouTube (Video)", class: "fa-brands fa-youtube" },
        { name: "Aplikasi Mobile (APK)", class: "fa-solid fa-mobile-screen" },
        { name: "Minecraft (Mod)", class: "fa-solid fa-cubes" },
        { name: "Dokumen (PDF)", class: "fa-solid fa-file-pdf" },
        { name: "Buku (Baca)", class: "fa-solid fa-book" },
        { name: "Toko (Cart)", class: "fa-solid fa-cart-shopping" },
        { name: "Info (Detail)", class: "fa-solid fa-circle-info" },
      ];

      function initIconDropdown() {
        const listContainer = document.getElementById("icon-dropdown-list");
        listContainer.innerHTML = iconList
          .map(
            (icon) => `
                <div onclick="selectIcon('${icon.class}', '${icon.name}')" class="flex items-center p-3 hover:bg-gray-800 cursor-pointer border-b border-gray-800 last:border-0">
                    <i class="${icon.class} text-starCyan w-6 text-center mr-3 text-lg"></i>
                    <span class="text-sm text-gray-300 font-medium">${icon.name}</span>
                </div>
            `,
          )
          .join("");
      }

      function toggleDropdown() {
        document
          .getElementById("icon-dropdown-list")
          .classList.toggle("hidden");
        document.getElementById("icon-search-input").focus();
      }

      function filterIcons() {
        const searchVal = document
          .getElementById("icon-search-input")
          .value.toLowerCase();
        const items = document.getElementById("icon-dropdown-list").children;
        for (let i = 0; i < items.length; i++) {
          const text = items[i].innerText.toLowerCase();
          items[i].style.display = text.includes(searchVal) ? "flex" : "none";
        }
      }

      function selectIcon(iconClass, iconName) {
        document.getElementById("p-btn-icon-value").value = iconClass;
        document.getElementById("icon-search-input").value = iconName;
        document.getElementById("selected-icon-preview").className =
          `${iconClass} text-starCyan mr-3 w-5 text-center`;
        document.getElementById("icon-dropdown-list").classList.add("hidden");
      }

      document.addEventListener("click", function (event) {
        const container = document.getElementById("icon-dropdown-container");
        if (container && !container.contains(event.target)) {
          document.getElementById("icon-dropdown-list").classList.add("hidden");
        }
      });

      // ================= SISTEM TOAST =================
      window.zwsToast = function (msg, type = "info") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");

        let bgClass = "bg-gray-800 border-gray-600 text-white";
        let icon = '<i class="fa-solid fa-circle-info text-blue-400"></i>';

        if (type === "success") {
          bgClass =
            "bg-emerald-900/95 border border-emerald-500 text-emerald-50";
          icon = '<i class="fa-solid fa-circle-check text-emerald-400"></i>';
        } else if (type === "error") {
          bgClass = "bg-red-900/95 border border-red-500 text-red-50";
          icon = '<i class="fa-solid fa-circle-exclamation text-red-400"></i>';
        } else if (type === "warning") {
          bgClass = "bg-yellow-900/95 border border-yellow-500 text-yellow-50";
          icon =
            '<i class="fa-solid fa-triangle-exclamation text-yellow-400"></i>';
        }

        toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] transform transition-all duration-300 translate-x-full opacity-0 pointer-events-auto backdrop-blur-md ${bgClass}`;
        toast.innerHTML = `<div class="text-xl">${icon}</div> <span class="text-sm font-medium tracking-wide leading-tight">${msg}</span>`;

        container.appendChild(toast);

        setTimeout(() => {
          toast.classList.remove("translate-x-full", "opacity-0");
        }, 10);
        setTimeout(() => {
          toast.classList.add("translate-x-full", "opacity-0");
          setTimeout(() => toast.remove(), 300);
        }, 3500);
      };

      // ================= SISTEM CUSTOM CONFIRMATION =================
      function zwsConfirm(msg, onConfirmCallback) {
        const dialog = document.getElementById("zws-dialog");
        const box = document.getElementById("zws-dialog-box");
        document.getElementById("zws-dialog-msg").innerText = msg;

        window.tempConfirmCallback = () => {
          closeZwsDialog();
          if (onConfirmCallback) onConfirmCallback();
        };

        document.getElementById("zws-dialog-buttons").innerHTML = `
                <button onclick="closeZwsDialog()" class="flex-1 bg-transparent border border-gray-600 text-gray-300 font-bold px-4 py-2.5 rounded-lg hover:bg-gray-800 hover:text-white transition-colors">BATAL</button>
                <button onclick="window.tempConfirmCallback()" class="flex-1 bg-red-600 text-white font-bold px-4 py-2.5 rounded-lg hover:bg-red-700 transition-colors shadow-[0_0_15px_rgba(220,38,38,0.4)]">YA, LANJUTKAN</button>`;

        dialog.classList.remove("hidden");
        setTimeout(() => {
          dialog.classList.remove("opacity-0");
          box.classList.remove("scale-95");
        }, 10);
      }

      function closeZwsDialog() {
        const dialog = document.getElementById("zws-dialog");
        const box = document.getElementById("zws-dialog-box");
        dialog.classList.add("opacity-0");
        box.classList.add("scale-95");
        setTimeout(() => {
          dialog.classList.add("hidden");
        }, 300);
      }

      function prosesLinkDrive(url) {
        if (!url || url === "#") return "#";
        const driveMatch =
          url.match(/\/d\/([a-zA-Z0-9_-]+)/) ||
          url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
        if (driveMatch && driveMatch[1]) {
          return `https://drive.google.com/uc?export=download&id=${driveMatch[1]}`;
        }
        return url;
      }

      // Ganti blok window.onload lama dengan ini:
      window.onload = () => {
        initIconDropdown();

        // Waktu mulai loading
        const startTime = Date.now();

        fetch(API_URL)
          .then((res) => res.json())
          .then((data) => {
            dbData = data;
            renderSeluruhUI();

            // Hitung berapa lama sisa waktu agar loader tampil minimal 1 detik (1000ms)
            const timeTaken = Date.now() - startTime;
            const remainingTime = Math.max(0, 1000 - timeTaken);

            setTimeout(() => {
              document
                .getElementById("loading-screen")
                .classList.add("opacity-0");
              setTimeout(
                () =>
                  document
                    .getElementById("loading-screen")
                    .classList.add("hidden"),
                500,
              );
            }, remainingTime);
          })
          .catch((err) => {
            console.error("Gagal terhubung ke API:", err);
            document.getElementById("loading-screen").classList.add("hidden");
            zwsToast("Koneksi ke server satelit terputus.", "error");
          });
      };

      function renderSeluruhUI() {
        document.getElementById("hero-name").innerText =
          dbData.profile.name || "M. Zhafran .MA";
        document.getElementById("profil-bio").innerText =
          dbData.profile.bio || "Bio kosong.";
        document.getElementById("admin-profile-name").value =
          dbData.profile.name || "";
        document.getElementById("admin-profile-bio").value =
          dbData.profile.bio || "";

        const rawCvLink = dbData.cv || "#";
        const btnCv = document.getElementById("btn-download-cv");
        btnCv.href = prosesLinkDrive(rawCvLink);
        document.getElementById("admin-cv-link").value =
          rawCvLink === "#" ? "" : rawCvLink;

        const user = JSON.parse(localStorage.getItem("zws_user"));
        renderProjects(user);
        if (user) tampilkanUser(user, false);

        showPage("beranda");
      }

      function kirimKeServerGAS(pesanSukses) {
        renderSeluruhUI();
        document.getElementById("loading-screen").classList.remove("hidden");
        document.getElementById("loading-screen").classList.remove("opacity-0");
        document.getElementById("loading-text").innerText =
          "MENGIRIM DATA KE CLOUD...";

        fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(dbData),
        })
          .then((res) => res.json())
          .then((res) => {
            document
              .getElementById("loading-screen")
              .classList.add("opacity-0");
            setTimeout(
              () =>
                document
                  .getElementById("loading-screen")
                  .classList.add("hidden"),
              500,
            );
            zwsToast(pesanSukses, "success");
            showPage("beranda");
          })
          .catch((err) => {
            document.getElementById("loading-screen").classList.add("hidden");
            zwsToast(
              "Gagal mengirim data. Periksa koneksi internet Anda.",
              "error",
            );
          });
      }

      function simpanProfilUtama() {
        dbData.profile.name =
          document.getElementById("admin-profile-name").value;
        dbData.profile.bio = document.getElementById("admin-profile-bio").value;
        kirimKeServerGAS("Log Identitas berhasil diperbarui secara global!");
      }

      function simpanCVKeDatabase() {
        dbData.cv = document.getElementById("admin-cv-link").value;
        kirimKeServerGAS("Tautan CV berhasil disinkronkan ke seluruh galaksi!");
      }

      function simpanProyek() {
        const title = document.getElementById("p-title").value;
        const link = document.getElementById("p-link").value;
        const desc = document.getElementById("p-desc").value;
        const btnText = document.getElementById("p-btn-text").value;
        const btnIcon = document.getElementById("p-btn-icon-value").value;

        if (!title || !link)
          return zwsToast("Nama Proyek dan Link Demo wajib diisi!", "warning");

        const projectData = { title, link, desc, btnText, btnIcon };

        if (editIndex > -1) {
          dbData.projects[editIndex] = projectData;
          kirimKeServerGAS("Log proyek berhasil diperbarui ke Cloud!");
        } else {
          dbData.projects.push(projectData);
          kirimKeServerGAS(
            "Proyek baru berhasil diluncurkan ke Database Cloud!",
          );
        }
        batalEdit();
      }

      function hapusProyek(index) {
        zwsConfirm(
          "Menghapus log proyek ini akan menghilangkannya dari server global. Lanjutkan?",
          function () {
            dbData.projects.splice(index, 1);
            kirimKeServerGAS("Proyek berhasil dilenyapkan dari sistem Cloud!");
          },
        );
      }

      // ================= MODAL & BASIC AUTH =================
      function bukaModalAuth(type) {
        document.getElementById("auth-modal").classList.remove("hidden");
        switchTabAuth(type);
      }
      window.tutupModalAuth = function () {
        document.getElementById("auth-modal").classList.add("hidden");
      };

      function switchTabAuth(type) {
        modeForm = type;
        const tLogin = document.getElementById("tab-login");
        const tSignup = document.getElementById("tab-signup");
        const iName = document.getElementById("input-name");
        const btn = document.getElementById("btn-submit");

        if (type === "login") {
          tLogin.className =
            "flex-1 py-3 text-sm font-bold text-starCyan border-b-2 border-starCyan";
          tSignup.className =
            "flex-1 py-3 text-sm font-bold text-gray-500 hover:text-gray-300";
          iName.classList.add("hidden");
          iName.removeAttribute("required");
          btn.innerText = "MASUK";
        } else {
          tSignup.className =
            "flex-1 py-3 text-sm font-bold text-starCyan border-b-2 border-starCyan";
          tLogin.className =
            "flex-1 py-3 text-sm font-bold text-gray-500 hover:text-gray-300";
          iName.classList.remove("hidden");
          iName.setAttribute("required", "true");
          btn.innerText = "BUAT AKUN";
        }
      }

      document.getElementById("auth-form").onsubmit = function (e) {
        e.preventDefault();
        const email = document.getElementById("input-email").value;
        const name =
          document.getElementById("input-name").value || "Crew Member";
        const userData = {
          name: name,
          email: email,
          picture: `https://ui-avatars.com/api/?name=${name}&background=1f2937&color=22d3ee`,
        };
        localStorage.setItem("zws_user", JSON.stringify(userData));

        tutupModalAuth();
        window.tampilkanUser(userData, true);
        renderProjects(userData);
        zwsToast(`Selamat datang kembali, ${name}!`, "success");
      };

      window.tampilkanUser = function (user, isLoginBaru = false) {
        document.getElementById("nav-logged-out").classList.add("hidden");
        document.getElementById("nav-logged-in").classList.remove("hidden");
        document.getElementById("nav-foto").src = user.picture;
        document.getElementById("profil-img").src = user.picture;
        document.getElementById("profil-name").innerText = user.name;
        document.getElementById("profil-email").innerText = user.email;

        // Panel Admin hanya muncul jika email cocok
        const adminPanel = document.getElementById("admin-panel");
        if (adminPanel) {
          if (user.email === ADMIN_EMAIL) adminPanel.classList.remove("hidden");
          else adminPanel.classList.add("hidden");
        }

        if (isLoginBaru) showPage("profil");
      };

      function logout() {
        zwsConfirm(
          "Apakah Anda yakin ingin memutus koneksi dan Log Out dari station?",
          function () {
            localStorage.removeItem("zws_user");
            location.reload();
          },
        );
      }

      function showPage(id) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("page-active"));
        document.getElementById("page-" + id).classList.add("page-active");
        window.scrollTo(0, 0);
        setTimeout(aktifkanAnimasiScroll, 50);
      }

      // Fungsi untuk merender project dengan kontrol admin
      function renderProjects(user) {
        const grid = document.getElementById("project-grid");
        const isAdmin = user && user.email === ADMIN_EMAIL; // Cek status Admin

        if (!dbData.projects || dbData.projects.length === 0) {
          grid.innerHTML =
            '<div class="md:col-span-3 text-center py-12 text-gray-500 font-mono">LAUNCHPAD KOSONG.</div>';
        } else {
          grid.innerHTML = dbData.projects
            .map((p, index) => {
              const btnText = p.btnText || "LIVE DEMO";
              const btnIcon = p.btnIcon || "fa-solid fa-play";

              // Logic TOMBOL ADMIN
              const adminActions = isAdmin
                ? `
                        <div class="flex gap-2 border-t border-gray-700 pt-3 mt-4">
                            <button onclick="editProyek(${index})" class="flex-1 bg-yellow-500/20 text-yellow-500 text-xs font-bold py-2 rounded hover:bg-yellow-500 hover:text-black transition-colors">
                                <i class="fa-solid fa-pen-to-square mr-1"></i> EDIT
                            </button>
                            <button onclick="hapusProyek(${index})" class="flex-1 bg-red-500/20 text-red-500 text-xs font-bold py-2 rounded hover:bg-red-500 hover:text-white transition-colors">
                                <i class="fa-solid fa-trash mr-1"></i> HAPUS
                            </button>
                        </div>
                    `
                : "";

              return `
                    <div class="glass p-6 rounded-xl hover:border-starCyan transition-all group flex flex-col h-full relative scroll-anim scroll-up">
                        <h3 class="font-bold text-white text-xl mb-3">${p.title}</h3>
                        <p class="text-sm text-gray-400 mb-6 flex-grow">${p.desc}</p>
                        <a href="${p.link}" target="_blank" class="block bg-voidGray text-center text-white text-xs font-bold py-2 rounded hover:bg-starCyan hover:text-black transition-colors uppercase">
                            <i class="${btnIcon} mr-2"></i> ${btnText}
                        </a>
                        ${adminActions} 
                    </div>`;
            })
            .join("");
        }
        aktifkanAnimasiScroll();
      }
    </script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
      import {
        getAuth,
        signInWithPopup,
        GoogleAuthProvider,
        GithubAuthProvider,
        FacebookAuthProvider,
      } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDXiY33kAumrMp4kMM_6J-LsWuGCtPM6hY",
        authDomain: "zws-auth.firebaseapp.com",
        projectId: "zws-auth",
        storageBucket: "zws-auth.firebasestorage.app",
        messagingSenderId: "21592339559",
        appId: "1:21592339559:web:95b00074154e6f2f3050c2",
        measurementId: "G-SVM7V0L2C5",
      };

      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const auth = getAuth(app);

      let isAuthInProgress = false;

      // KUNCI LAYAR PENUH (Mencegah Klik Apapun di Background)
      function lockUI(pesan) {
        const loader = document.getElementById("loading-screen");
        document.getElementById("loading-text").innerText = pesan;
        loader.classList.remove("hidden");
        setTimeout(() => loader.classList.remove("opacity-0"), 10);
      }

      // BUKA KUNCI LAYAR
      function unlockUI(instant = false) {
        const loader = document.getElementById("loading-screen");
        if (instant) {
          loader.classList.add("hidden"); // Hilang instan
          loader.classList.remove("opacity-0");
        } else {
          loader.classList.add("opacity-0"); // Transisi smooth 500ms
          setTimeout(() => loader.classList.add("hidden"), 500);
        }
      }

      function handleLoginSuccess(result) {
        const user = result.user;
        const userData = {
          name: user.displayName || "Crew Member",
          email: user.email || "Tanpa Email",
          picture:
            user.photoURL ||
            `https://ui-avatars.com/api/?name=${user.displayName}&background=1f2937&color=22d3ee`,
        };

        localStorage.setItem("zws_user", JSON.stringify(userData));
        window.tutupModalAuth();
        window.tampilkanUser(userData, true);
        window.zwsToast(
          `Sistem Otentikasi Berhasil. Selamat datang, ${userData.name}!`,
          "success",
        );
      }

      function handleLoginError(error) {
        if (
          error.code === "auth/popup-closed-by-user" ||
          error.code === "auth/cancelled-popup-request"
        ) {
          unlockUI(true); // <--- Kunci: BUKA LAYAR SECEPAT KILAT
          window.zwsToast("Otentikasi dibatalkan.", "warning");
          return;
        }
        unlockUI(true); // Error lain juga harus membuka layar instan
        window.zwsToast("Gagal login: " + error.message, "error");
      }

      // ================= HELPER LOADING TOMBOL =================
      function setBtnLoading(btn) {
        if (!btn) return null;
        const originalHtml = btn.innerHTML;
        // Mengganti spinner dot dengan circle-notch yang smooth
        btn.innerHTML =
          '<i class="fa-solid fa-circle-notch fa-spin text-lg"></i>';
        btn.classList.add("opacity-75", "cursor-not-allowed");
        return originalHtml;
      }

      function resetBtnLoading(btn, originalHtml) {
        if (!btn) return;
        btn.innerHTML = originalHtml;
        btn.classList.remove("opacity-75", "cursor-not-allowed");
      }

      // ================= FUNGSI OAUTH DENGAN LOCK & RESET =================
      window.loginGoogle = function (btn) {
        if (isAuthInProgress) return;
        isAuthInProgress = true;

        const originalHtml = setBtnLoading(btn);
        lockUI("MENUNGGU OTENTIKASI GOOGLE..."); // Kunci Layar

        const provider = new GoogleAuthProvider();
        provider.addScope("profile");
        provider.addScope("email");

        signInWithPopup(auth, provider)
          .then(handleLoginSuccess)
          .catch(handleLoginError)
          .finally(() => {
            isAuthInProgress = false;
            resetBtnLoading(btn, originalHtml);
            unlockUI(); // Buka Layar Apapun yang Terjadi
          });
      };

      window.loginGitHub = function (btn) {
        if (isAuthInProgress) return;
        isAuthInProgress = true;

        const originalHtml = setBtnLoading(btn);
        lockUI("MENUNGGU OTENTIKASI GITHUB...");

        const provider = new GithubAuthProvider();
        provider.addScope("read:user");
        provider.addScope("user:email");

        signInWithPopup(auth, provider)
          .then(handleLoginSuccess)
          .catch(handleLoginError)
          .finally(() => {
            isAuthInProgress = false;
            resetBtnLoading(btn, originalHtml);
            unlockUI();
          });
      };

      window.loginFacebook = function (btn) {
        if (isAuthInProgress) return;
        isAuthInProgress = true;

        const originalHtml = setBtnLoading(btn);
        lockUI("MENUNGGU OTENTIKASI FACEBOOK/META...");

        const provider = new FacebookAuthProvider();
        provider.addScope("public_profile");
        provider.addScope("email");

        signInWithPopup(auth, provider)
          .then(handleLoginSuccess)
          .catch(handleLoginError)
          .finally(() => {
            isAuthInProgress = false;
            resetBtnLoading(btn, originalHtml);
            unlockUI();
          });
      };

      window.loginApple = function (btn) {
        window.zwsToast(
          "Akses Ditolak: Membutuhkan Apple Developer Account berbayar ($99/tahun).",
          "warning",
        );
      };

      window.loginInstagram = function (btn) {
        window.zwsToast(
          "Gunakan tombol 'Facebook' jika akun Instagram Anda sudah tertaut ke Meta.",
          "info",
        );
      };
    </script>
  </body>
</html>
