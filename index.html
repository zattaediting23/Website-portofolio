        .scroll-anim { opacity: 0; transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .scroll-up { transform: translateY(30px); }
        .scroll-left { transform: translateX(-30px); }
        .scroll-right { transform: translateX(30px); }

    </style>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz_Tl2lpfkgBOsf0ksTRRGp7DlS_W3Ar3QayP6egYlF89F4-ULgCwCfXga7Z51p5Zyd9w/exec"; 
        const ADMIN_EMAIL = "zhafranediting23@gmail.com";
        let modeForm = 'login'; 
        let editIndex = -1; 
        let editJourneyIndex = -1; // Variabel baru untuk deteksi edit Timeline
        let dbData = { profile: {}, cv: "#", projects: [], journey: [] }; // Default schema

        // Animasi Scroll
        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                    scrollObserver.unobserve(entry.target); 
                }
            });
        }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

        function aktifkanAnimasiScroll() {
            document.querySelectorAll('.scroll-anim:not(.show)').forEach(el => scrollObserver.observe(el));
        }

        // Fitur Lock UI / Loading
        function lockUI(pesan) {
            const loader = document.getElementById('loading-screen');
            document.getElementById('loading-text').innerText = pesan;
            document.getElementById('loading-text').classList.remove('text-red-500');
            loader.classList.remove('hidden');
            setTimeout(() => loader.classList.remove('opacity-0'), 10);
        }
        function unlockUI(instant = false) {
            const loader = document.getElementById('loading-screen');
            if(instant) {
                loader.classList.add('hidden');
                loader.classList.remove('opacity-0');
            } else {
                loader.classList.add('opacity-0');
                setTimeout(() => loader.classList.add('hidden'), 500);
            }
        }

        // Icon Dropdown System
        const iconList = [
            { name: "Mainkan (Play)", class: "fa-solid fa-play" },
            { name: "Unduh (Download)", class: "fa-solid fa-download" },
            { name: "GitHub (Source Code)", class: "fa-brands fa-github" },
            { name: "Website (Globe)", class: "fa-solid fa-globe" },
            { name: "Buka Tautan (External)", class: "fa-solid fa-arrow-up-right-from-square" },
            { name: "Kode (Code)", class: "fa-solid fa-code" },
            { name: "Google Drive", class: "fa-brands fa-google-drive" },
            { name: "YouTube (Video)", class: "fa-brands fa-youtube" },
            { name: "Aplikasi Mobile (APK)", class: "fa-solid fa-mobile-screen" },
            { name: "Minecraft (Mod)", class: "fa-solid fa-cubes" },
            { name: "Dokumen (PDF)", class: "fa-solid fa-file-pdf" },
            { name: "Buku (Baca)", class: "fa-solid fa-book" },
            { name: "Toko (Cart)", class: "fa-solid fa-cart-shopping" },
            { name: "Info (Detail)", class: "fa-solid fa-circle-info" }
        ];

        function initIconDropdown() {
            const listContainer = document.getElementById('icon-dropdown-list');
            listContainer.innerHTML = iconList.map(icon => `
                <div onclick="selectIcon('${icon.class}', '${icon.name}')" class="flex items-center p-3 hover:bg-gray-800 cursor-pointer border-b border-gray-800 last:border-0">
                    <i class="${icon.class} text-starCyan w-6 text-center mr-3 text-lg"></i>
                    <span class="text-sm text-gray-300 font-medium">${icon.name}</span>
                </div>
            `).join('');
        }

        function toggleDropdown() {
            document.getElementById('icon-dropdown-list').classList.toggle('hidden');
            document.getElementById('icon-search-input').focus();
        }

        function filterIcons() {
            const searchVal = document.getElementById('icon-search-input').value.toLowerCase();
            const items = document.getElementById('icon-dropdown-list').children;
            for(let i = 0; i < items.length; i++) {
                const text = items[i].innerText.toLowerCase();
                items[i].style.display = text.includes(searchVal) ? 'flex' : 'none';
            }
        }

        function selectIcon(iconClass, iconName) {
            document.getElementById('p-btn-icon-value').value = iconClass;
            document.getElementById('icon-search-input').value = iconName;
            document.getElementById('selected-icon-preview').className = `${iconClass} text-starCyan mr-3 w-5 text-center`;
            document.getElementById('icon-dropdown-list').classList.add('hidden');
        }

        document.addEventListener('click', function(event) {
            const container = document.getElementById('icon-dropdown-container');
            if (container && !container.contains(event.target)) {
                document.getElementById('icon-dropdown-list').classList.add('hidden');
            }
        });

        // Toast & Dialog
        window.zwsToast = function(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgClass = 'bg-gray-800 border-gray-600 text-white';
            let icon = '<i class="fa-solid fa-circle-info text-blue-400"></i>';
            
            if (type === 'success') { bgClass = 'bg-emerald-900/95 border border-emerald-500 text-emerald-50'; icon = '<i class="fa-solid fa-circle-check text-emerald-400"></i>'; } 
            else if (type === 'error') { bgClass = 'bg-red-900/95 border border-red-500 text-red-50'; icon = '<i class="fa-solid fa-circle-exclamation text-red-400"></i>'; } 
            else if (type === 'warning') { bgClass = 'bg-yellow-900/95 border border-yellow-500 text-yellow-50'; icon = '<i class="fa-solid fa-triangle-exclamation text-yellow-400"></i>'; }

            toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] transform transition-all duration-300 translate-x-full opacity-0 pointer-events-auto backdrop-blur-md ${bgClass}`;
            toast.innerHTML = `<div class="text-xl">${icon}</div> <span class="text-sm font-medium tracking-wide leading-tight">${msg}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-x-full', 'opacity-0'); }, 10);
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);

        function prosesLinkDrive(url) {
            if (!url || url === '#') return '#';
            const driveMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (driveMatch && driveMatch[1]) return `https://drive.google.com/uc?export=download&id=${driveMatch[1]}`;
            return url;
        }

            const startTime = Date.now();
            
            fetch(API_URL)
                .then(res => {
                    if (!res.ok) throw new Error("Server Error: " + res.status);
                    return res.json();
                })
                .then(data => {
                    dbData = data;
                    renderSeluruhUI();
                    const elapsed = Date.now() - startTime;
                    const remaining = Math.max(0, 1000 - elapsed);
                    setTimeout(() => unlockUI(), remaining);
                })
                .catch(err => {

                    document.getElementById('loading-text').innerText = "ERROR: " + err.message;
                    document.getElementById('loading-text').classList.add('text-red-500');

            setBtnLoading(btn);
            const provider = new FacebookAuthProvider();
            provider.addScope('public_profile');
            provider.addScope('email');
            signInWithRedirect(auth, provider);
        };

        window.loginApple = function() {
            window.zwsToast("Akses Ditolak: Membutuhkan Apple Developer Account berbayar ($99/tahun).", "warning");
        };

        // ===== FUNGSI LOGIN INSTAGRAM (ROUTE VIA META) =====
        window.loginInstagram = function(btn) {
            if (isAuthInProgress) return;
            isAuthInProgress = true;
            
            // 1. Berikan edukasi UX kepada user dengan Toast
            window.zwsToast("Membuka gerbang Meta. Silakan gunakan akun Instagram yang tertaut di halaman berikutnya.", "info");
            
            // 2. Beri jeda 2 detik agar pesan terbaca, lalu eksekusi
            setTimeout(() => {
                lockUI("MENGALIHKAN KE SISTEM META/INSTAGRAM...");
                setBtnLoading(btn);
                
                // Meminjam pintu FacebookAuthProvider karena Instagram berada di bawah Meta
                const provider = new FacebookAuthProvider();
                provider.addScope('public_profile');
                provider.addScope('email');
                
                signInWithRedirect(auth, provider);
            }, 2000);
        };
    </script>
</body>
</html>
